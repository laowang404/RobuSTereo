DATA_CONFIG:
    DATA_INFOS:

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/SID/Campus_CW_Rain_Day_012_filter_10.txt',
                TESTING: './filelist/SID/Campus_CW_Rain_Day_012_filter_10.txt'
            }
            RETURN_RIGHT_DISP: False
            FORCE_CROP: [0,130,0,0]
            DATA_PATH: ../data/SID

    DATA_TRANSFORM:
        EVALUATING:
            - { NAME: DivisiblePad, BY: 32 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        TESTING:
            - { NAME: DivisiblePad, BY: 32 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }

EVALUATOR:
    BATCH_SIZE_PER_GPU: 4
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3