DATA_CONFIG:
    DATA_INFOS:

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/SeeThroughFog/dense_fog-withgt-strongest.txt',
                TESTING: './filelist/SeeThroughFog/dense_fog-withgt-strongest.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/SeeThroughFog

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/SeeThroughFog/light_fog-withgt-strongest.txt',
                TESTING: './filelist/SeeThroughFog/light_fog-withgt-strongest.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/SeeThroughFog

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/SeeThroughFog/rain-withgt-strongest.txt',
                TESTING: './filelist/SeeThroughFog/rain-withgt-strongest.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/SeeThroughFog

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/SeeThroughFog/snow-withgt-strongest.txt',
                TESTING: './filelist/SeeThroughFog/snow-withgt-strongest.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/SeeThroughFog

    DATA_TRANSFORM:
        EVALUATING:
            - { NAME: Resize, SIZE: [448,672] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
            # - { NAME: NormalizeImage, MEAN: [ 0.485, 0.456, 0.406 ], STD: [ 0.229, 0.224, 0.225 ] }
        TESTING:
            - { NAME: Resize, SIZE: [448,672] }
            # - { NAME: DivisiblePad, BY: 32 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
            # - { NAME: NormalizeImage, MEAN: [ 0.485, 0.456, 0.406 ], STD: [ 0.229, 0.224, 0.225 ] }

EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3