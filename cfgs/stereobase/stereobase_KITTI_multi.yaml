DATA_CONFIG:
    DATA_INFOS:
        -   DATASET: KittiWarpDataset
            DATA_SPLIT: {
                    TRAINING: './filelist/KITTI15/KITTI_multi.txt',
                    EVALUATING: '',
                    TESTING: ''
                }
            EVAL_DATASET:   
                DATASET: KittiDataset
                DATA_SPLIT: {
                    # TRAINING: ./data/KITTI12//kitti12_train194.txt,
                    EVALUATING: './data/KITTI15/kitti15_val20.txt',
                    TESTING: './data/KITTI15/kitti15_val20.txt'
                }
                DATA_PATH: /data/wangyuran/DepthGen/Datasets/KITTI15
                RETURN_RIGHT_DISP: true
            
            DATA_PATH: /data1/wangyuran/dataset1/KITTI_multi
            
    DATA_TRANSFORM:
        TRAINING:
            - { NAME: StereoColorJitter, BRIGHTNESS: [ 0.6, 1.4 ], CONTRAST: [ 0.6, 1.4 ], SATURATION: [ 0.6, 1.4 ], HUE: 0.5, ASYMMETRIC_PROB: 0.2 }
            - { NAME: RandomErase, PROB: 0.5, MAX_TIME: 2, BOUNDS: [ 50, 100 ] }
            - { NAME: RandomScale, SIZE: [ 320, 608 ], MIN_SCALE: -0.2, MAX_SCALE: 0.4, SCALE_PROB: 0.8, STRETCH_PROB: 0.8 }
            - { NAME: RandomCrop, SIZE: [ 320, 608 ], Y_JITTER: False }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        EVALUATING:
            - { NAME: RightTopPad, SIZE: [ 320, 608 ] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }

MODEL:
    NAME: StereoBaseGRU
    MAX_DISP: &max_disp 192
    NUM_GROUPS: 8
    CONCAT_CHANNELS: 8
    USE_CONCAT_VOLUME: true
    USE_GWC_VOLUME: true
    USE_SUB_VOLUME: false
    USE_INTERLACED_VOLUME: false
    HIDDEN_DIMS: [ 128, 128, 128 ]
    N_DOWNSAMPLE: 2
    N_GRU_LAYERS: 3
    CORR_RADIUS: 4
    CORR_LEVELS: 2
    SLOW_FAST_GRU: False
    TRAIN_ITERS: 22
    EVAL_ITERS: 32
    FIND_UNUSED_PARAMETERS: false
    CKPT: -1
    PRETRAINED_MODEL: './output/MfSDataset/StereoBaseGRU/stereobase_my_pretrain_sceneflow/SB-SF-MY-vKITTI/ckpt/checkpoint_epoch_5.pth'

OPTIMIZATION:
    FREEZE_BN: true
    SYNC_BN: true
    AMP: true
    BATCH_SIZE_PER_GPU: 5
    NUM_EPOCHS: 50

    OPTIMIZER:
        NAME: AdamW
        LR: &lr 0.0002
        WEIGHT_DECAY: 1.0e-05
        EPS: 1.0e-08

    SCHEDULER:
        NAME: OneCycleLR
        ON_EPOCH: False
        MAX_LR: *lr
        PCT_START: 0.01
        CYCLE_MOMENTUM: False
        ANNEAL_STRATEGY: linear

    CLIP_GRAD:
        TYPE: value
        CLIP_VALUE: 1.0

EVALUATOR:
    BATCH_SIZE_PER_GPU: 4
    MAX_DISP: *max_disp
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3

TRAINER:
    EVAL_INTERVAL: 1
    CKPT_SAVE_INTERVAL: 10
    MAX_CKPT_SAVE_NUM: 5
    LOGGER_ITER_INTERVAL: 10
    TRAIN_VISUALIZATION: False
    EVAL_VISUALIZATION: False
