DATA_CONFIG:
    DATA_INFOS:
        -   DATASET: KittiDataset
            DATA_SPLIT: {
                EVALUATING: ./filelist/KITTI12//kitti12_train194.txt,
                TESTING: ./data/KITTI12/kitti12_test.txt
            }
            DATA_PATH: /data/wangyuran/DepthGen/Datasets/KITTI12
            RETURN_RIGHT_DISP: false

    DATA_TRANSFORM:
        EVALUATING:
            # - { NAME: DivisiblePad, BY: 32, MODE: round }
            # - { NAME: DivisiblePad, BY: 224, MODE: round }
            - { NAME: DivisibleResize, BY: 224}
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        TESTING:
            # - { NAME: DivisiblePad, BY: 32, MODE: round }
            - { NAME: DivisiblePad, BY: 224, MODE: round }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }

EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3
