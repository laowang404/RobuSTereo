MODEL:
    NAME: PSMNet
    MAX_DISP: &max_disp 192
    FIND_UNUSED_PARAMETERS: false
    CKPT: -1
    PRETRAINED_MODEL: './pretrain/PSMNet_Sceneflow.pt' # The path of checkpoint trained with the Sceneflow dataset.

OPTIMIZATION:
    BATCH_SIZE_PER_GPU: 8
    FREEZE_BN: false
    SYNC_BN: true
    AMP: false
    NUM_EPOCHS: 50

    OPTIMIZER:
        NAME: RMSprop
        LR: 0.001

    SCHEDULER:
        NAME: MultiStepLR
        GAMMA: 0.1
        MILESTONES: [ 9 ]
        ON_EPOCH: True
        WARMUP:
            WARM_STEPS: 500

    CLIP_GRAD:
        TYPE: norm
        MAX_NORM: 35
        NORM_TYPE: 2

EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: *max_disp
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3

TRAINER:
    EVAL_INTERVAL: 1
    CKPT_SAVE_INTERVAL: 1
    MAX_CKPT_SAVE_NUM: 50
    LOGGER_ITER_INTERVAL: 10
    TRAIN_VISUALIZATION: True
    EVAL_VISUALIZATION: True