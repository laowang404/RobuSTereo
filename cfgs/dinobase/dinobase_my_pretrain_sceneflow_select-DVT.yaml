DATA_CONFIG:
    DATA_INFOS:
        # -   DATASET: MfSDataset
        #     DATA_SPLIT: {
        #             TRAINING: '',
        #             EVALUATING: '',
        #             TESTING: ''
        #         }
        #     EVAL_DATASET:   
        #         DATASET: KittiDataset
        #         DATA_SPLIT: {
        #             TRAINING: '',
        #             EVALUATING: '',
        #             TESTING: ''
        #         }
        #         DATA_PATH: /data/wangyuran/DepthGen/Datasets/KITTI15
        #         RETURN_RIGHT_DISP: true
        #     DATA_NUM: 16000
        #     DATA_PATH: /data/wangyuran/DepthGen/Datasets/Training_set
        
        -   DATASET: SceneFlowDataset
            DATA_SPLIT: {
                TRAINING: ./filelist/SceneFlow/sceneflow_finalpass_train.txt,
                EVALUATING: '',
                TESTING: ./filelist/SceneFlow/sceneflow_finalpass_test.txt
            }
            DATA_NUM: 16000
            DATA_PATH: /data1/wangyuran/dataset1/Sceneflow
            RETURN_RIGHT_DISP: false
        

        -   DATASET: VKITTIDataset
            DATA_SPLIT: {
                TRAINING: './filelist/VirtualKitti2/virtualkitti2_trainval21260.txt',
                EVALUATING: '',
                TESTING: ''
            }
            # DATA_NUM: 16000
            RETURN_RIGHT_DISP: False
            DATA_PATH: /data/wangyuran/datasets/DepthGen/vkitti


        # -   DATASET: KittiDataset
        #     DATA_SPLIT: {
        #         TRAINING: '',
        #         EVALUATING: ./filelist/KITTI15//kitti15_train200.txt,
        #         TESTING: ''
        #     }
        #     DATA_PATH: /data1/wangyuran/DiffStereo/DiffStereo/data/KITTI15
        #     RETURN_RIGHT_DISP: false

    DATA_TRANSFORM:
        TRAINING:
            - { NAME: StereoColorJitter, BRIGHTNESS: [ 0.6, 1.4 ], CONTRAST: [ 0.6, 1.4 ], SATURATION: [ 0.6, 1.4 ], HUE: 0.5, ASYMMETRIC_PROB: 0.2 }
            - { NAME: RandomErase, PROB: 0.5, MAX_TIME: 2, BOUNDS: [ 50, 100 ] }
            - { NAME: RandomScale, SIZE: [ 320, 608 ], MIN_SCALE: -0.2, MAX_SCALE: 0.4, SCALE_PROB: 0.8, STRETCH_PROB: 0.8 }
            - { NAME: RandomCrop, SIZE: [ 320, 608 ], Y_JITTER: False }
            - { NAME: Resize, SIZE: [ 448, 896 ] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        EVALUATING:
            - { NAME: RightTopPad, SIZE: [ 544, 960 ] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
MODEL:
    NAME: DinoBase
    MAX_DISP: &max_disp 192
    BACKBONE: mobilenetv2_100
    NUM_GROUPS: 8
    CONCAT_CHANNELS: 8
    USE_CONCAT_VOLUME: true
    USE_GWC_VOLUME: true
    USE_SUB_VOLUME: false
    USE_INTERLACED_VOLUME: false
    HIDDEN_DIMS: [ 128, 128, 128 ]
    N_DOWNSAMPLE: 2
    N_GRU_LAYERS: 3
    CORR_RADIUS: 4
    CORR_LEVELS: 2
    SLOW_FAST_GRU: False
    TRAIN_ITERS: 22
    EVAL_ITERS: 32
    FIND_UNUSED_PARAMETERS: true
    CKPT: -1
    PRETRAINED_MODEL: 'output/MfSDataset/DinoBase/dinobase_my_pretrain_sceneflow_select/DB-MIX-pretrain-l/ckpt/checkpoint_epoch_89.pth'
    ENCODER_CFG:
        AMP: true
        USE_VGG: false
        CNN_KWARGS:
            pretrained: true

OPTIMIZATION:
    FREEZE_BN: true
    SYNC_BN: true
    AMP: true
    BATCH_SIZE_PER_GPU: 2
    NUM_EPOCHS: 10

    OPTIMIZER:
        NAME: AdamW
        LR: &lr 0.0001
        WEIGHT_DECAY: 1.0e-05
        EPS: 1.0e-08

    SCHEDULER:
        NAME: OneCycleLR
        ON_EPOCH: False
        MAX_LR: *lr
        PCT_START: 0.01
        CYCLE_MOMENTUM: False
        ANNEAL_STRATEGY: linear

    # CLIP_GRAD:
    #     TYPE: value
    #     CLIP_VALUE: 1.0

    CLIP_GRAD:
        TYPE: norm
        MAX_NORM: 0.01

EVALUATOR:
    BATCH_SIZE_PER_GPU: 2
    MAX_DISP: *max_disp
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3

TRAINER:
    EVAL_INTERVAL: 1
    CKPT_SAVE_INTERVAL: 10
    MAX_CKPT_SAVE_NUM: 10
    LOGGER_ITER_INTERVAL: 10
    TRAIN_VISUALIZATION: false
    EVAL_VISUALIZATION: false
