DATA_CONFIG:
    DATA_INFOS:

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/DrivingStereo/rainy.txt',
                TESTING: './filelist/DrivingStereo/rainy.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/DrivingStereo/weather

    DATA_TRANSFORM:
        EVALUATING:
            - { NAME: DivisibleResize, BY: 224 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        TESTING:
            - { NAME: DivisibleResize, BY: 224 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
            # - { NAME: NormalizeImage, MEAN: [ 0.485, 0.456, 0.406 ], STD: [ 0.229, 0.224, 0.225 ] }


EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3