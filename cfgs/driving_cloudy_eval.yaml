DATA_CONFIG:
    DATA_INFOS:

        -   DATASET: DrivingDataset
            DATA_SPLIT: {
                EVALUATING: './filelist/DrivingStereo/cloudy.txt',
                TESTING: './filelist/DrivingStereo/cloudy.txt'
            }
            RETURN_RIGHT_DISP: False
            DATA_PATH: ../data/DrivingStereo/weather

    DATA_TRANSFORM:
        EVALUATING:
            - { NAME: DivisibleResize, BY: 224 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
        TESTING:
            - { NAME: DivisiblePad, BY: 32 }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }

EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3